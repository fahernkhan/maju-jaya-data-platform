version: '3.8'

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.11
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__FERNET_KEY: '81HqDtbqAywKSOumSha3BhWNOdQ26slT6K0YaZeZyPs='
    AIRFLOW__WEBSERVER__SECRET_KEY: 'super_secret_key_maju_jaya'
    GOOGLE_APPLICATION_CREDENTIALS: /opt/credentials/sa-pipeline-dev.json
    MYSQL_HOST: mysql-source
    MYSQL_PORT: '3306'
    MYSQL_DB: maju_jaya
    MYSQL_USER: maju_jaya
    MYSQL_PASSWORD: maju_jaya_pass
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./pipelines:/opt/airflow/pipelines
    - ./scripts:/opt/airflow/scripts
    - ./dbt:/opt/airflow/dbt
    - ./data:/opt/airflow/data
    - ./data_quality:/opt/airflow/data_quality
    - ./credentials:/opt/credentials:ro
  depends_on:
    airflow-db:
      condition: service_healthy

services:
  # ── PostgreSQL for Airflow metadata (proven stable) ────────
  airflow-db:
    image: postgres:15
    container_name: maju-airflow-db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      retries: 5

  # ── MySQL Source (simulasi OLTP) ───────────────────────────
  mysql-source:
    image: mysql:8.0
    container_name: maju-mysql-source
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: maju_jaya
      MYSQL_USER: maju_jaya
      MYSQL_PASSWORD: maju_jaya_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init_mysql.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 10
      start_period: 30s
    command: --default-authentication-plugin=mysql_native_password

  # ── Adminer (MySQL GUI) ────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: maju-adminer
    ports:
      - "8080:8080"
    depends_on:
      mysql-source:
        condition: service_healthy

  # ── Airflow Init (one-time) ────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: maju-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname Admin \
          --role Admin \
          --email admin@example.com || true
    restart: "no"

  # ── Airflow Webserver ──────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: maju-airflow-web
    command: webserver
    ports:
      - "8081:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      retries: 5
      start_period: 30s
    restart: always

  # ── Airflow Scheduler ──────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: maju-airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: always

volumes:
  airflow_pg_data:
  mysql_data: