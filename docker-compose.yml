# ============================================================
# Maju Jaya Data Platform — Docker Compose
#
# 6 services:
#   postgres        — Airflow metadata DB (bukan MySQL!)
#   mysql-source    — OLTP simulation (seed data otomatis)
#   adminer         — Database GUI (browse MySQL)
#   airflow-init    — One-time: migrate DB + create admin user
#   airflow-web     — Airflow UI
#   airflow-scheduler — DAG scheduler
#
# 3 design decisions yang mencegah error:
#   1. Custom Dockerfile → packages pre-installed saat build
#   2. PostgreSQL backend → bukan MySQL (lock contention issues)
#   3. service_completed_successfully → init selesai dulu baru boot
#
# Usage:
#   docker compose build        # ~3 menit pertama kali
#   docker compose up -d        # start semua
#   docker compose ps           # verifikasi
#   docker compose down         # stop
#   docker compose down -v      # stop + hapus volumes (reset data)
# ============================================================

version: '3.8'

# ── SHARED AIRFLOW CONFIG ───────────────────
x-airflow-common: &airflow-common
  image: maju-airflow:latest
  env_file:
    - .env
  environment: &airflow-env
    # ── Airflow Core ──
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    AIRFLOW__CORE__DEFAULT_TIMEZONE: Asia/Jakarta
    AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE: Asia/Jakarta

    # ── GCP ──
    GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS}
    GCP_PROJECT_ID: ${GCP_PROJECT_ID}
    GCS_BUCKET_RAW: ${GCS_BUCKET_RAW}
    BQ_DATASET_RAW: ${BQ_DATASET_RAW}

    # ── MySQL ──
    MYSQL_HOST: ${MYSQL_HOST}
    MYSQL_PORT: ${MYSQL_PORT}
    MYSQL_DB: ${MYSQL_DB}
    MYSQL_USER: ${MYSQL_USER}
    MYSQL_PASSWORD: ${MYSQL_PASSWORD}

    # ── Paths ──
    CSV_DIR: /opt/airflow/data
    EXCEL_DIR: /opt/airflow/data/excel

  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./pipelines:/opt/airflow/pipelines
    - ./scripts:/opt/airflow/scripts
    - ./cleaning:/opt/airflow/cleaning
    - ./dbt:/opt/airflow/dbt
    - ./data:/opt/airflow/data
    - ./data_quality:/opt/airflow/data_quality
    - ./credentials:/opt/credentials:ro

  depends_on:
    postgres:
      condition: service_healthy

  restart: unless-stopped

# ── SERVICES ────────────────────────────────
services:

  # ── PostgreSQL ────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: maju-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MySQL Source ──────────────────────────
  mysql-source:
    image: mysql:8.0
    container_name: maju-mysql-source
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/01_init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped

  # ── Adminer ───────────────────────────────
  adminer:
    image: adminer:4.8.1
    container_name: maju-adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql-source
    depends_on:
      mysql-source:
        condition: service_healthy
    restart: unless-stopped

  # ── Airflow Init ──────────────────────────
  airflow-init:
    <<: *airflow-common
    restart: "no"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate && \
        airflow users create \
          --username ${AIRFLOW_ADMIN_USERNAME} \
          --password ${AIRFLOW_ADMIN_PASSWORD} \
          --firstname ${AIRFLOW_ADMIN_FIRSTNAME} \
          --lastname ${AIRFLOW_ADMIN_LASTNAME} \
          --role Admin \
          --email ${AIRFLOW_ADMIN_EMAIL}

  # ── Airflow Webserver ─────────────────────
  airflow-web:
    <<: *airflow-common
    container_name: maju-airflow-web
    command: airflow webserver --port 8080
    ports:
      - "8081:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      mysql-source:
        condition: service_healthy

  # ── Airflow Scheduler ─────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: maju-airflow-scheduler
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      mysql-source:
        condition: service_healthy

# ── VOLUMES ────────────────────────────────
volumes:
  postgres_data:
  mysql_data: