version: '3.8'

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_pass@postgres:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__FERNET_KEY: "81HqDtbqAywKSOumSha3BhWNOdQ26slT6K0YaZeZyPs="
    AIRFLOW__WEBSERVER__SECRET_KEY: "maju_jaya_secret_2026"
    AIRFLOW__CORE__DEFAULT_TIMEZONE: Asia/Jakarta
    GOOGLE_APPLICATION_CREDENTIALS: /opt/credentials/sa-pipeline-dev.json
    MYSQL_HOST: mysql-source
    MYSQL_PORT: "3306"
    MYSQL_DB: maju_jaya
    MYSQL_USER: maju_jaya
    MYSQL_PASSWORD: maju_jaya_pass
    GCP_PROJECT_ID: maju-jaya-platform
    GCS_BUCKET_RAW: maju-jaya-raw-dev
    BQ_DATASET_RAW: raw_maju
    CSV_DIR: /opt/airflow/data
    EXCEL_DIR: /opt/airflow/data/excel
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./pipelines:/opt/airflow/pipelines
    - ./scripts:/opt/airflow/scripts
    - ./cleaning:/opt/airflow/cleaning
    - ./dbt:/opt/airflow/dbt
    - ./data:/opt/airflow/data
    - ./data_quality:/opt/airflow/data_quality
    - ./credentials:/opt/credentials:ro
  depends_on:
    postgres:
      condition: service_healthy
  restart: unless-stopped

services:
  postgres:
    image: postgres:15-alpine
    container_name: maju-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow_pass
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  mysql-source:
    image: mysql:8.0
    container_name: maju-mysql-source
    environment:
      MYSQL_ROOT_PASSWORD: root_pass_123
      MYSQL_DATABASE: maju_jaya
      MYSQL_USER: maju_jaya
      MYSQL_PASSWORD: maju_jaya_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/01_init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_pass_123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped

  adminer:
    image: adminer:4.8.1
    container_name: maju-adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql-source
    depends_on:
      mysql-source:
        condition: service_healthy
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    container_name: maju-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin --password admin \
          --firstname Admin --lastname Admin \
          --role Admin --email admin@majujaya.com || true
    restart: "no"

  airflow-web:
    <<: *airflow-common
    container_name: maju-airflow-web
    command: airflow webserver --port 8080
    ports:
      - "8081:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  airflow-scheduler:
    <<: *airflow-common
    container_name: maju-airflow-scheduler
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
  mysql_data: